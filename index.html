      <h1>Dual-Link QR Code Generator</h1>
      <p>
        Create a single QR code that encodes two different URLs. When cells differ between the two
        codes, each module is split vertically, horizontally, or diagonally so scanners can read
        either link depending on angle. Uses high error correction (level H). All processing runs in
        your browser; nothing is sent to a server.
      </p>
